<!-- Size Selector Component -->

<!-- Complete Size Section -->
<div class="size-section">
  <div class="size-label-row">
    <label class="form-lbl">Size</label>
    <div>
      <button class="size-guide-link">Size Guide</button>
      <button class="size-finder-cta">Find My Size</button>
    </div>
  </div>
  <div class="size-options">
    <button class="size-btn" onclick="selSize(this)">XS</button>
    <button class="size-btn" onclick="selSize(this)">S</button>
    <button class="size-btn sel" onclick="selSize(this)">M</button>
    <button class="size-btn" onclick="selSize(this)">L</button>
    <button class="size-btn dis" disabled title="Out of stock">XL</button>
  </div>
</div>

<!-- Size Options Only (for reuse) -->
<div class="size-options">
  <button class="size-btn" onclick="selSize(this)">XS</button>
  <button class="size-btn" onclick="selSize(this)">S</button>
  <button class="size-btn" onclick="selSize(this)">M</button>
  <button class="size-btn" onclick="selSize(this)">L</button>
  <button class="size-btn" onclick="selSize(this)">XL</button>
</div>

<!-- Size Options with Different Selection -->
<div class="size-options">
  <button class="size-btn sel" onclick="selSize(this)">XS</button>
  <button class="size-btn" onclick="selSize(this)">S</button>
  <button class="size-btn" onclick="selSize(this)">M</button>
  <button class="size-btn" onclick="selSize(this)">L</button>
  <button class="size-btn" onclick="selSize(this)">XL</button>
</div>

<!-- Size Options with Multiple Disabled -->
<div class="size-options">
  <button class="size-btn dis" disabled title="Out of stock">XS</button>
  <button class="size-btn" onclick="selSize(this)">S</button>
  <button class="size-btn sel" onclick="selSize(this)">M</button>
  <button class="size-btn dis" disabled title="Out of stock">L</button>
  <button class="size-btn dis" disabled title="Out of stock">XL</button>
</div>

<!-- Minimal Size Selector (no labels) -->
<div class="size-options">
  <button class="size-btn" onclick="selSize(this)">S</button>
  <button class="size-btn" onclick="selSize(this)">M</button>
  <button class="size-btn sel" onclick="selSize(this)">L</button>
</div>

<!-- Size Section with Custom Label -->
<div class="size-section">
  <div class="size-label-row">
    <label class="form-lbl">Available Sizes</label>
    <button class="size-guide-link">Size Chart</button>
  </div>
  <div class="size-options">
    <button class="size-btn" onclick="selSize(this)">XS</button>
    <button class="size-btn" onclick="selSize(this)">S</button>
    <button class="size-btn" onclick="selSize(this)">M</button>
    <button class="size-btn" onclick="selSize(this)">L</button>
    <button class="size-btn" onclick="selSize(this)">XL</button>
  </div>
</div>

<!-- Size Result Display (for size finder modal) -->
<div id="size-result" style="display:none;margin-top:16px;padding:16px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);border-radius:8px">
  <div style="font-size:14px;font-weight:700;color:#16a34a;margin-bottom:4px" id="size-result-main">
    Recommended: Size M
  </div>
  <div style="font-size:12px;color:#16a34a" id="size-result-sub">
    Based on your measurements, regular fit
  </div>
</div>
