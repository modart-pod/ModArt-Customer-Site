<!-- Color Swatches Component -->

<!-- Product Color Swatches (for customizer) -->
<div class="color-swatches">
  <div class="color-swatch sel" 
       style="background:#1a1a1a" 
       title="Black" 
       onclick="selectColour(this,'#1a1a1a','https://images.unsplash.com/photo-1556821840-3a63f15732ce?w=600&q=80')">
  </div>
  <div class="color-swatch" 
       style="background:#f7f5f1;border:1.5px solid #e2dfd8" 
       title="White" 
       onclick="selectColour(this,'#f7f5f1','https://images.unsplash.com/photo-1621072156002-e2fccdc0b176?w=600&q=80')">
  </div>
  <div class="color-swatch" 
       style="background:#D72638" 
       title="Red" 
       onclick="selectColour(this,'#D72638','https://images.unsplash.com/photo-1543508282-6319a3e2621f?w=600&q=80')">
  </div>
  <div class="color-swatch" 
       style="background:#2d3a4a" 
       title="Navy" 
       onclick="selectColour(this,'#2d3a4a','https://images.unsplash.com/photo-1554568218-0f1715e72254?w=600&q=80')">
  </div>
  <div class="color-swatch" 
       style="background:#4a3728" 
       title="Mocha" 
       onclick="selectColour(this,'#4a3728','https://images.unsplash.com/photo-1503342217505-b0a15ec3261c?w=600&q=80')">
  </div>
</div>

<!-- Text Color Swatches (for text tool) -->
<div class="color-swatches" style="margin-top:12px">
  <div class="color-swatch sel" 
       style="background:#fff;border:1.5px solid #e2dfd8" 
       title="White" 
       onclick="selTextColor(this,'#fff')">
  </div>
  <div class="color-swatch" 
       style="background:#111" 
       title="Black" 
       onclick="selTextColor(this,'#111')">
  </div>
  <div class="color-swatch" 
       style="background:#D72638" 
       title="Red" 
       onclick="selTextColor(this,'#D72638')">
  </div>
  <div class="color-swatch" 
       style="background:#F59E0B" 
       title="Gold" 
       onclick="selTextColor(this,'#F59E0B')">
  </div>
</div>
