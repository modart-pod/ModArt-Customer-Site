<!-- ================================================================
     LAYERS PANEL COMPONENT
     Right sidebar showing layer stack
     ================================================================ -->

<!-- RIGHT: Layers panel -->
<div class="customizer-layers-col">
  <div class="layers-panel">
    <div class="layers-title">Layers</div>
    <div id="layers-list">
      <div style="font-size:12px;color:var(--g3);text-align:center;padding:20px 0;letter-spacing:.08em;text-transform:uppercase">No layers yet</div>
    </div>
    <div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border)">
      <div class="tool-section-title" style="margin-bottom:10px">Snapping</div>
      <button style="width:100%;padding:10px;background:rgba(215,38,56,.08);border:1.5px solid rgba(215,38,56,.25);border-radius:var(--r-md);font-family:var(--font);font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--red);cursor:pointer" id="snap-toggle" onclick="toggleSnap()">SNAPPING: ON</button>
    </div>
  </div>
</div>
